# Builds modmanager + server (Linux AppImage, bundled mods). Prerelease + assets on push to main/master.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            modmanager/package-lock.json
            server/package-lock.json

      - name: Build modmanager
        working-directory: modmanager
        run: |
          npm ci
          npm run dist -- --linux AppImage
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build server maintainer
        working-directory: server
        run: |
          npm ci
          npm run dist -- --linux AppImage
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload dist (for release job)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            modmanager/dist
            server/dist
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Create release zips (mods-only + one-click app bundles)
        run: |
          set -euo pipefail
          zip -r mods.zip mods
          shopt -s nullglob
          S=(server/dist/*.AppImage)
          M=(modmanager/dist/*.AppImage)
          if [ ${#S[@]} -eq 0 ] || [ ${#M[@]} -eq 0 ]; then
            echo "Missing AppImage(s)"
            ls -la server/dist modmanager/dist || true
            exit 1
          fi
          zip -r server-manager.zip mods "${S[@]}"
          zip -r mod-manager.zip mods "${M[@]}"

      - name: Publish GitHub release (bundles + mods-only)
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${GITHUB_REF#refs/tags/}
          tag_name: Release ${GITHUB_REF#refs/tags/}
          target_commitish: ${{ github.sha }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Pick one download:

            | File | Use |
            |------|-----|
            | **zomboid-server-maintainer-with-mods.zip** | Server Maintainer AppImage + `mods/` (copy mods into `Server/mods` if needed) |
            | **zomboid-mod-manager-with-mods.zip** | Mod Manager AppImage + `mods/` |
            | **mods.zip** | Mods folder only (no app) |

            Each AppImage already includes `mods/` under `resources/mods`; the loose `mods/` tree in the zip is for copying to a dedicated server or clients without unpacking the AppImage.
          files: |
            server-manager.zip
            mod-manager.zip
            mods.zip