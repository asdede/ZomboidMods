# Builds both Electron apps (modmanager + server). Job succeeds only if both builds succeed.
name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            modmanager/package-lock.json
            server/package-lock.json

      - name: Build modmanager
        working-directory: modmanager
        run: |
          npm ci
          npm run dist -- --linux dir
        env:
          CI: true
          # Skip code signing / notarization prompts
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build server maintainer
        working-directory: server
        run: |
          npm ci
          npm run dist -- --linux dir
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false
