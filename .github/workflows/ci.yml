# Builds modmanager + server (Linux AppImage, bundled mods). Prerelease + assets on push to main/master.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            modmanager/package-lock.json
            server/package-lock.json

      - name: Build modmanager
        working-directory: modmanager
        run: |
          npm ci
          npm run dist -- --linux AppImage
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build server maintainer
        working-directory: server
        run: |
          npm ci
          npm run dist -- --linux AppImage
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload dist (for release job)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            modmanager/dist
            server/dist
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Pack mods folder (for dedicated server / manual copy)
        run: zip -r mods.zip mods

      - name: Publish GitHub release (AppImages + mods.zip)
        uses: softprops/action-gh-release@v2
        with:
          name: Dev build ${{ github.sha }}
          tag_name: dev-${{ github.sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Assets:
            - **Mod Manager** and **Server Maintainer** Linux AppImages (each bundles `mods/` under `resources/mods`).
            - **mods.zip** — same `mods/` tree for copying to a dedicated server or clients.
          files: |
            modmanager/dist/*.AppImage
            server/dist/*.AppImage
            mods.zip