# Builds both Electron apps. On successful push to main/master, mirrors to prod repos (optional secrets).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            modmanager/package-lock.json
            server/package-lock.json

      - name: Build modmanager
        working-directory: modmanager
        run: |
          npm ci
          npm run dist -- --linux dir
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build server maintainer
        working-directory: server
        run: |
          npm ci
          npm run dist -- --linux dir
        env:
          CI: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # Not GitHub "forks" (those are 1:1 with upstream name). Creates/pushes two prod mirror repos.
  mirror-prod:
    needs: build
    # secrets.* is not allowed in job or step if: — gate via mirror_gate step outputs (see first step).
    if: |
      success() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check mirror secrets
        id: mirror_gate
        env:
          TOKEN: ${{ secrets.PROD_MIRROR_TOKEN }}
          CLIENT: ${{ secrets.PROD_CLIENT_REPO }}
          SERVER: ${{ secrets.PROD_SERVER_REPO }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$CLIENT" ] && [ -n "$SERVER" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.mirror_gate.outputs.ok == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure clientProd & serverProd repos exist
        if: ${{ steps.mirror_gate.outputs.ok == 'true' }}
        uses: actions/github-script@v7
        env:
          CLIENT: ${{ secrets.PROD_CLIENT_REPO }}
          SERVER: ${{ secrets.PROD_SERVER_REPO }}
        with:
          github-token: ${{ secrets.PROD_MIRROR_TOKEN }}
          script: |
            function normalizeRepo(input) {
              let r = String(input || "").trim();
              r = r.replace(/^\/+/, "");
              r = r.replace(/^https?:\/\/github\.com\//i, "");
              while (r.endsWith("/")) r = r.slice(0, -1);
              if (r.toLowerCase().endsWith(".git")) r = r.slice(0, -4);
              while (r.endsWith("/")) r = r.slice(0, -1);
              return r;
            }

            async function ensureRepo(fullName) {
              const normalized = normalizeRepo(fullName);
              const [owner, repo] = normalized.split("/").map((s) => s.trim());
              if (!owner || !repo) throw new Error(`Bad repo name: ${fullName}`);
              try {
                await github.rest.repos.get({ owner, repo });
                core.info(`Repo exists: ${owner}/${repo}`);
                return;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              core.info(`Creating repo: ${owner}/${repo}`);
              let isOrg = false;
              try {
                await github.rest.orgs.get({ org: owner });
                isOrg = true;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              try {
                if (isOrg) {
                  await github.rest.repos.createInOrg({
                    org: owner,
                    name: repo,
                    private: true,
                    auto_init: false,
                  });
                } else {
                  const { data: auth } = await github.rest.users.getAuthenticated();
                  if (auth.login !== owner) {
                    throw new Error(
                      `Cannot create ${fullName}: token user is "${auth.login}" but repo owner is "${owner}". Use a token for that account, or use an org.`
                    );
                  }
                  await github.rest.repos.createForAuthenticatedUser({
                    name: repo,
                    private: true,
                    auto_init: false,
                  });
                }
                core.info(`Created: ${fullName}`);
              } catch (createErr) {
                if (createErr.status === 403) {
                  throw new Error(
                    `GitHub refused to create ${owner}/${repo} (403: token cannot create this repo). ` +
                      `Quick fix: create an empty private repo "${repo}" under ${owner} on github.com, then re-run. ` +
                      `Or use a Classic PAT with full "repo" scope — Fine-grained PATs often cannot call POST /user/repos. ` +
                      `Orgs: token needs rights to create repos in that org.`
                  );
                }
                throw createErr;
              }
            }
            await ensureRepo(process.env.CLIENT);
            await ensureRepo(process.env.SERVER);

      - name: Push current branch to both prod remotes
        if: ${{ steps.mirror_gate.outputs.ok == 'true' }}
        env:
          TOKEN: ${{ secrets.PROD_MIRROR_TOKEN }}
          CLIENT: ${{ secrets.PROD_CLIENT_REPO }}
          SERVER: ${{ secrets.PROD_SERVER_REPO }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Secrets must end up as owner/repo only (GitHub returns "not found" for bad URL or no access).
          normalize_repo() {
            local r="$1"
            while [[ "$r" == /* ]]; do
              r="${r#/}"
            done
            r="${r#https://github.com/}"
            r="${r#http://github.com/}"
            while [[ "$r" == */ ]]; do
              r="${r%/}"
            done
            r="${r%.git}"
            while [[ "$r" == */ ]]; do
              r="${r%/}"
            done
            r="$(echo "$r" | tr -d '[:space:]')"
            echo "$r"
          }
          CLIENT="$(normalize_repo "$CLIENT")"
          SERVER="$(normalize_repo "$SERVER")"
          if [[ "$CLIENT" != */* ]] || [[ "$SERVER" != */* ]]; then
            echo "PROD_CLIENT_REPO / PROD_SERVER_REPO must be owner/repo (e.g. MyOrg/clientProd), not a bare name."
            exit 1
          fi
          echo "Mirror targets (normalized): CLIENT=${CLIENT} SERVER=${SERVER}"
          # Preflight: same 404 as git when PAT cannot read a private repo — fail with a clear message.
          verify_repo_access() {
            local full="$1"
            local code
            code=$(curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${full}")
            echo "GitHub API GET /repos/${full} -> HTTP ${code}"
            case "$code" in
              200) return 0 ;;
              404)
                echo "::error::Cannot access ${full} with PROD_MIRROR_TOKEN (HTTP 404). Either the repo does not exist, or it is private and this PAT cannot read it (GitHub hides private repos as 404). Use a Classic PAT with repo scope, or Fine-grained: add both repos + Contents Read/Write."
                return 1
                ;;
              403)
                echo "::error::GitHub denied access to ${full} (HTTP 403). Check token permissions."
                return 1
                ;;
              401)
                echo "::error::GitHub rejected PROD_MIRROR_TOKEN (HTTP 401). Regenerate the PAT."
                return 1
                ;;
              *)
                echo "::error::Unexpected HTTP ${code} for ${full}"
                return 1
                ;;
            esac
          }
          verify_repo_access "$CLIENT" || exit 1
          verify_repo_access "$SERVER" || exit 1
          USER_JSON=$(curl -sS -f \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user") || { echo "::error::GET /user failed; check PROD_MIRROR_TOKEN."; exit 1; }
          GH_USER=$(echo "$USER_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['login'])")
          echo "PAT authenticated as: ${GH_USER}"
          # Use GitHub CLI as git credential helper — embedded user:token URLs often fail with fine-grained PATs even when REST returns 200.
          export GH_TOKEN="$TOKEN"
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push "https://github.com/${CLIENT}.git" "HEAD:refs/heads/${BRANCH}" --force
          git push "https://github.com/${SERVER}.git" "HEAD:refs/heads/${BRANCH}" --force
